[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Long cache for built Astro assets (hashed filenames)
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Long cache for converted media in public/assets/
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security baseline headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# cleanUrls equivalent (Vercel's cleanUrls = true)
[[redirects]]
  from = "/*.html"
  to = "/:splat"
  status = 301

# Image CDN auto-optimization for any image fetch
[build.processing.images]
  compress = true
